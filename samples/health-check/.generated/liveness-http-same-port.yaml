apiVersion: v1
kind: Service
metadata:
  labels:
    app: liveness-http
    service: liveness-http
  name: liveness-http
spec:
  ports:
    - name: http
      port: 8001
  selector:
    app: liveness-http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: liveness-http
spec:
  selector:
    matchLabels:
      app: liveness-http
      version: v1
  template:
    metadata:
      labels:
        app: liveness-http
        version: v1
    spec:
      containers:
        - image: registry.istio.io/release/health:example
          livenessProbe:
            httpGet:
              path: /foo
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
          name: liveness-http
          ports:
            - containerPort: 8001
