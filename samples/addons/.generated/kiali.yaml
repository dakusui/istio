apiVersion: v1
kind: Service
metadata:
  annotations: null
  labels:
    app: kiali
    app.kubernetes.io/instance: kiali
    app.kubernetes.io/name: kiali
    app.kubernetes.io/part-of: kiali
    app.kubernetes.io/version: v2.22.0
    helm.sh/chart: kiali-server-2.22.0
    version: v2.22.0
  name: kiali
  namespace: istio-system
spec:
  ports:
    - appProtocol: http
      name: http
      port: 20001
      protocol: TCP
    - appProtocol: http
      name: http-metrics
      port: 9090
      protocol: TCP
  selector:
    app.kubernetes.io/instance: kiali
    app.kubernetes.io/name: kiali
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: kiali
    app.kubernetes.io/instance: kiali
    app.kubernetes.io/name: kiali
    app.kubernetes.io/part-of: kiali
    app.kubernetes.io/version: v2.22.0
    helm.sh/chart: kiali-server-2.22.0
    version: v2.22.0
  name: kiali
  namespace: istio-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: kiali
      app.kubernetes.io/name: kiali
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      annotations:
        checksum/config: 0e92cf3a1b73675411d334b12dc5ff938f21a06ba65e33b702a1cca95e9acc06
        kiali.io/dashboards: go,kiali
        prometheus.io/port: '9090'
        prometheus.io/scheme: http
        prometheus.io/scrape: 'true'
        proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
      labels:
        app: kiali
        app.kubernetes.io/instance: kiali
        app.kubernetes.io/name: kiali
        app.kubernetes.io/part-of: kiali
        app.kubernetes.io/version: v2.22.0
        helm.sh/chart: kiali-server-2.22.0
        sidecar.istio.io/inject: 'false'
        version: v2.22.0
      name: kiali
    spec:
      containers:
        - command:
            - /opt/kiali/kiali
            - -config
            - /kiali-configuration/config.yaml
          env:
            - name: ACTIVE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LOG_LEVEL
              value: info
            - name: LOG_FORMAT
              value: text
            - name: LOG_TIME_FIELD_FORMAT
              value: 2006-01-02T15:04:05Z07:00
            - name: LOG_SAMPLER_RATE
              value: '1'
          image: quay.io/kiali/kiali:v2.22
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /kiali/healthz
              port: api-port
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 30
          name: kiali
          ports:
            - containerPort: 20001
              name: api-port
            - containerPort: 9090
              name: http-metrics
          readinessProbe:
            httpGet:
              path: /kiali/healthz
              port: api-port
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            limits:
              memory: 1Gi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          startupProbe:
            failureThreshold: 6
            httpGet:
              path: /kiali/healthz
              port: api-port
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
            - mountPath: /kiali-configuration
              name: kiali-configuration
            - mountPath: /kiali-cert
              name: kiali-cert
            - mountPath: /kiali-secret
              name: kiali-secret
            - mountPath: /kiali-cabundle
              name: kiali-cabundle
            - mountPath: /kiali-remote-cluster-secrets/kiali-multi-cluster-secret
              name: kiali-multi-cluster-secret
              readOnly: true
      serviceAccountName: kiali
      volumes:
        - configMap:
            name: kiali
          name: kiali-configuration
        - name: kiali-cert
          secret:
            optional: true
            secretName: istio.kiali-service-account
        - name: kiali-secret
          secret:
            optional: true
            secretName: kiali
        - configMap:
            name: kiali-cabundle
            optional: true
          name: kiali-cabundle
        - name: kiali-multi-cluster-secret
          secret:
            optional: true
            secretName: kiali-multi-cluster-secret
