apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: zipkin
  name: zipkin
  namespace: istio-system
spec:
  selector:
    matchLabels:
      app: zipkin
  template:
    metadata:
      labels:
        app: zipkin
        sidecar.istio.io/inject: 'false'
    spec:
      containers:
        - env:
            - name: STORAGE_METHOD
              value: mem
          image: docker.io/openzipkin/zipkin-slim:3.4.0
          name: zipkin
          readinessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: zipkin
  name: tracing
  namespace: istio-system
spec:
  ports:
    - name: http-query
      port: 80
      protocol: TCP
      targetPort: 9411
  selector:
    app: zipkin
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    name: zipkin
  name: zipkin
  namespace: istio-system
spec:
  ports:
    - name: http-query
      port: 9411
      targetPort: 9411
  selector:
    app: zipkin
