apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: skywalking-oap
  name: skywalking-oap
  namespace: istio-system
spec:
  selector:
    matchLabels:
      app: skywalking-oap
  template:
    metadata:
      labels:
        app: skywalking-oap
        sidecar.istio.io/inject: 'false'
    spec:
      containers:
        - env:
            - name: SW_HEALTH_CHECKER
              value: default
          image: docker.io/apache/skywalking-oap-server:9.7.0
          name: skywalking-oap
          readinessProbe:
            exec:
              command:
                - /skywalking/bin/swctl
                - health
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: skywalking-oap
  name: tracing
  namespace: istio-system
spec:
  ports:
    - name: grpc
      port: 11800
      protocol: TCP
      targetPort: 11800
    - name: http-query
      port: 12800
      protocol: TCP
      targetPort: 12800
  selector:
    app: skywalking-oap
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    name: skywalking-oap
  name: skywalking-oap
  namespace: istio-system
spec:
  ports:
    - name: grpc
      port: 11800
      targetPort: 11800
    - name: http-query
      port: 12800
      targetPort: 12800
  selector:
    app: skywalking-oap
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: skywalking-ui
  name: skywalking-ui
  namespace: istio-system
spec:
  selector:
    matchLabels:
      app: skywalking-ui
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: 'false'
      labels:
        app: skywalking-ui
    spec:
      containers:
        - env:
            - name: SW_OAP_ADDRESS
              value: http://skywalking-oap:12800
          image: docker.io/apache/skywalking-ui:9.1.0
          name: skywalking-ui
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: skywalking-ui
  name: tracing-ui
  namespace: istio-system
spec:
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app: skywalking-ui
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    name: skywalking-ui
  name: skywalking-ui
  namespace: istio-system
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: skywalking-ui
