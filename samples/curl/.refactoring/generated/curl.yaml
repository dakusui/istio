apiVersion: v1
kind: ServiceAccount
metadata:
  name: curl
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: curl
    service: curl
  name: curl
spec:
  ports:
    - name: http
      port: 80
  selector:
    app: curl
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curl
  template:
    metadata:
      labels:
        app: curl
    spec:
      containers:
        - command:
            - /bin/sleep
            - infinity
          image: docker.io/curlimages/curl:8.16.0
          imagePullPolicy: IfNotPresent
          name: curl
          volumeMounts:
            - mountPath: /etc/curl/tls
              name: secret-volume
      serviceAccountName: curl
      terminationGracePeriodSeconds: 0
      volumes:
        - name: secret-volume
          secret:
            optional: true
            secretName: curl-secret
