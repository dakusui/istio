apiVersion: v1
kind: Service
metadata:
  labels:
    app: details
    service: details
  name: details
spec:
  ports:
    - name: http
      port: 9080
  selector:
    app: details
---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    account: details
  name: bookinfo-details
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: details
    version: v1
  name: details-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: details
      version: v1
  template:
    metadata:
      labels:
        app: details
        version: v1
    spec:
      containers:
        - image: registry.istio.io/release/examples-bookinfo-details-v1:1.20.3
          imagePullPolicy: IfNotPresent
          name: details
          ports:
            - containerPort: 9080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - all
            runAsNonRoot: true
      serviceAccountName: bookinfo-details
---
