apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: helloworld
    version: v1
  name: helloworld-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: helloworld
      version: v1
  template:
    metadata:
      annotations:
        sidecar.istio.io/bootstrapOverride: istio-custom-bootstrap-config
      labels:
        app: helloworld
        version: v1
    spec:
      containers:
        - image: registry.istio.io/release/examples-helloworld-v1
          imagePullPolicy: IfNotPresent
          name: helloworld
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: 100m
