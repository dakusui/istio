apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  name: bookinfo-application
  namespace: argocd
spec:
  destination:
    name: ambient-cluster
    namespace: ambient
  project: default
  source:
    directory:
      exclude: application.yaml
    path: application
    repoURL: '{repo-placeholder}'
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
