apiVersion: v1
data:
  opentelemetry-collector-config: "receivers:\n  opencensus:\n    endpoint: 0.0.0.0:55678\n\
    \  otlp/auth:\n    protocols:\n      grpc:\n        endpoint: 0.0.0.0:5317\n \
    \       auth:\n          authenticator: bearertokenauth\n  otlp:\n    protocols:\n\
    \      grpc:\n        endpoint: 0.0.0.0:4317\n      http:\n        endpoint: 0.0.0.0:4318\n\
    processors:\n  batch:\nexporters:\n  zipkin:\n    # Export to zipkin for easy\
    \ querying\n    endpoint: http://zipkin.istio-system.svc:9411/api/v2/spans\n \
    \ debug:\n    verbosity: detailed\nextensions:\n  bearertokenauth:\n    token:\
    \ \"somerandomtoken\"\n  health_check:\n  pprof:\n  zpages:\nservice:\n  extensions:\n\
    \  - health_check\n  - pprof\n  - zpages\n  - bearertokenauth\n  pipelines:\n\
    \    logs:\n      receivers: [otlp]\n      processors: [batch]\n      exporters:\
    \ [debug]\n    traces:\n      receivers:\n      - otlp\n      - opencensus\n \
    \     exporters:\n      - zipkin\n      - debug\n    traces/auth:\n      receivers:\n\
    \      - otlp/auth\n      exporters:\n      - zipkin\n      - debug\n"
kind: ConfigMap
metadata:
  labels:
    app: opentelemetry-collector
  name: opentelemetry-collector-conf
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: opentelemetry-collector
  name: opentelemetry-collector
spec:
  ports:
    - name: grpc-opencensus
      port: 55678
      protocol: TCP
      targetPort: 55678
    - name: grpc-otlp
      port: 4317
      protocol: TCP
      targetPort: 4317
    - name: http-otlp
      port: 4318
      protocol: TCP
      targetPort: 4318
    - name: grpc-otlp-auth
      port: 5317
      protocol: TCP
      targetPort: 5317
  selector:
    app: opentelemetry-collector
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-collector
spec:
  selector:
    matchLabels:
      app: opentelemetry-collector
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: opentelemetry-collector
        sidecar.istio.io/inject: 'false'
    spec:
      containers:
        - args:
            - --config=/conf/opentelemetry-collector-config.yaml
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
          image: docker.io/otel/opentelemetry-collector-contrib:0.123.0
          imagePullPolicy: IfNotPresent
          name: opentelemetry-collector
          ports:
            - containerPort: 4317
              protocol: TCP
            - containerPort: 4318
              protocol: TCP
            - containerPort: 55678
              name: grpc-opencensus
              protocol: TCP
          resources:
            limits:
              cpu: '2'
              memory: 4Gi
            requests:
              cpu: 200m
              memory: 400Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /conf
              name: opentelemetry-collector-config-vol
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
      volumes:
        - configMap:
            defaultMode: 420
            items:
              - key: opentelemetry-collector-config
                path: opentelemetry-collector-config.yaml
            name: opentelemetry-collector-conf
          name: opentelemetry-collector-config-vol
