apiVersion: v1
data:
  opentelemetry-collector-config: "receivers:\n  otlp:\n    protocols:\n      grpc:\n\
    \      http:\nprocessors:\n  batch:\n  attributes:\n    actions:\n    - action:\
    \ insert\n      key: loki.attribute.labels\n      value: pod, namespace,cluster,mesh\n\
    exporters:\n  loki:\n    endpoint: \"http://loki.istio-system.svc:3100/loki/api/v1/push\"\
    \n  logging:\n    loglevel: debug\nextensions:\n  health_check:\nservice:\n  extensions:\n\
    \  - health_check\n  pipelines:\n    logs:\n      receivers: [otlp]\n      processors:\
    \ [attributes]\n      exporters: [loki, logging]\n"
kind: ConfigMap
metadata:
  labels:
    app: opentelemetry-collector
  name: opentelemetry-collector-conf
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: opentelemetry-collector
  name: opentelemetry-collector
spec:
  ports:
    - name: grpc-opencensus
      port: 55678
      protocol: TCP
      targetPort: 55678
    - name: grpc-otlp
      port: 4317
      protocol: TCP
      targetPort: 4317
  selector:
    app: opentelemetry-collector
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-collector
spec:
  selector:
    matchLabels:
      app: opentelemetry-collector
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: opentelemetry-collector
        sidecar.istio.io/inject: 'false'
    spec:
      containers:
        - command:
            - /otelcol-contrib
            - --config=/conf/opentelemetry-collector-config.yaml
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
          image: docker.io/otel/opentelemetry-collector-contrib:0.73.0
          imagePullPolicy: IfNotPresent
          name: opentelemetry-collector
          ports:
            - containerPort: 4317
              protocol: TCP
            - containerPort: 55678
              name: grpc-opencensus
              protocol: TCP
          resources:
            limits:
              cpu: '2'
              memory: 4Gi
            requests:
              cpu: 200m
              memory: 400Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /conf
              name: opentelemetry-collector-config-vol
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
      volumes:
        - configMap:
            defaultMode: 420
            items:
              - key: opentelemetry-collector-config
                path: opentelemetry-collector-config.yaml
            name: opentelemetry-collector-conf
          name: opentelemetry-collector-config-vol
