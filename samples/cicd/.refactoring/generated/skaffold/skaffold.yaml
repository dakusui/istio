apiVersion: skaffold/v2beta22
kind: Config
metadata:
  name: istio-base
profiles:
  - activation:
      - command: dev
    deploy:
      helm:
        releases:
          - chartPath: ../../../manifests/charts/base
            createNamespace: true
            name: istio-base
            namespace: istio-system
    name: dev
  - activation:
      - command: run
    deploy:
      helm:
        releases:
          - createNamespace: true
            name: istio-base
            namespace: istio-system
            remoteChart: base
            repo: https://istio-release.storage.googleapis.com/charts
    name: run
---
apiVersion: skaffold/v2beta22
kind: Config
metadata:
  name: istiod
profiles:
  - activation:
      - command: dev
    deploy:
      helm:
        releases:
          - chartPath: ../../../manifests/charts/istio-control/istio-discovery
            name: istiod
            namespace: istio-system
    name: dev
  - activation:
      - command: run
    deploy:
      helm:
        releases:
          - name: istiod
            namespace: istio-system
            remoteChart: istiod
            repo: https://istio-release.storage.googleapis.com/charts
    name: run
requires:
  - configs:
      - istio-base
---
apiVersion: skaffold/v2beta22
kind: Config
metadata:
  name: ingress
profiles:
  - activation:
      - command: dev
    deploy:
      helm:
        releases:
          - chartPath: ../../../manifests/charts/gateway
            name: istio-ingressgateway
            namespace: istio-system
    name: dev
  - activation:
      - command: run
    deploy:
      helm:
        releases:
          - name: istio-ingressgateway
            namespace: istio-system
            remoteChart: gateway
            repo: https://istio-release.storage.googleapis.com/charts
    name: run
requires:
  - configs:
      - istiod
---
apiVersion: skaffold/v2beta22
deploy:
  kubectl:
    manifests:
      - ../../../samples/addons/prometheus.yaml
kind: Config
metadata:
  name: prometheus
requires:
  - configs:
      - istiod
---
apiVersion: skaffold/v2beta22
deploy:
  helm:
    releases:
      - name: kiali-server
        namespace: istio-system
        remoteChart: kiali-server
        repo: https://kiali.org/helm-charts
        valuesFiles:
          - ../../../manifests/addons/values-kiali.yaml
        version: v1.44.0
kind: Config
metadata:
  name: kiali
requires:
  - configs:
      - prometheus
---
apiVersion: skaffold/v2beta22
deploy:
  kubectl:
    hooks:
      before:
        - host:
            command:
              - sh
              - -c
              - kubectl label namespace default istio-injection=enabled --overwrite
            os:
              - darwin
              - linux
        - host:
            command:
              - cmd.exe
              - /C
              - kubectl label namespace default istio-injection=enabled --overwrite
            os:
              - windows
    manifests:
      - ../../../samples/bookinfo/platform/kube/bookinfo.yaml
      - ../../../samples/bookinfo/networking/bookinfo-gateway.yaml
      - ../../../samples/bookinfo/networking/destination-rule-all.yaml
kind: Config
metadata:
  name: bookinfo
requires:
  - configs:
      - ingress
